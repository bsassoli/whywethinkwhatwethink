<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ink background with slightly rounded corners -->
  <rect width="64" height="64" rx="7" fill="#1A1714"/>
  <!-- W letterform — cream, bold, round joins -->
  <polyline
    points="7,13 19,51 32,13 45,51 57,13"
    stroke="#F4EDD8"
    stroke-width="9.5"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Red accent underline — the brand mark -->
  <rect x="16" y="56" width="32" height="4" rx="2" fill="#C8312A"/>
</svg>
